{% extends 'base.html' %}
{% load static %}
{% block title %}Login - ServiceHub{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 bg-gray-50">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">

        <div class="w-14 h-14 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-5">
            <i class="fa-solid fa-right-to-bracket text-blue-600 text-xl"></i>
        </div>

        <h2 class="text-2xl font-bold text-center text-gray-800 mb-1">Welcome Back</h2>
        <p class="text-center text-gray-400 text-sm mb-7">Log in to your ServiceHub account</p>

        <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">
                    <i class="fa-solid fa-envelope mr-1 text-blue-500"></i> Email
                </label>
                <input type="email" name="email" required autofocus
                    placeholder="you@example.com"
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-2">
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">
                    <i class="fa-solid fa-lock mr-1 text-blue-500"></i> Password
                </label>
                <input type="password" name="password" required
                    placeholder="Enter your password"
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Forgot password link -->
            <div class="text-right mb-6">
                <a href="{% url 'reset_password_request' %}" class="text-blue-600 text-xs hover:underline">
                    <i class="fa-solid fa-key mr-1"></i>Forgot password?
                </a>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow text-sm">
                <i class="fa-solid fa-right-to-bracket mr-2"></i>Login
            </button>
        </form>

        <p class="text-center text-sm mt-5 text-gray-500">
            Don't have an account?
            <a href="{% url 'register_customer' %}" class="text-blue-600 font-semibold hover:underline">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Password Reset Complete - ServiceHub{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 bg-gray-50">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md text-center">

        <div class="w-16 h-16 bg-green-100 rounded-2xl flex items-center justify-center mx-auto mb-5">
            <i class="fa-solid fa-circle-check text-green-600 text-2xl"></i>
        </div>

        <h2 class="text-2xl font-bold text-gray-800 mb-2">Password Reset!</h2>
        <p class="text-gray-400 text-sm mb-8 leading-relaxed">
            Your password has been successfully updated.<br>
            You can now log in with your new password.
        </p>

        <a href="{% url 'login' %}"
            class="inline-block bg-blue-600 text-white px-10 py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow text-sm">
            <i class="fa-solid fa-right-to-bracket mr-2"></i>Login Now
        </a>
    </div>
</div>
{% endblock %}

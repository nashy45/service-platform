services:
  - type: web
    name: service-platform
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn --bind 0.0.0.0:$PORT service_platform.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: service-platform-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False

databases:
  - name: service-platform-db
    plan: free
    databaseName: service_platform_db
    user: service_platform_user
